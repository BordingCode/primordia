<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#10204a"/>
      <stop offset="70%" stop-color="#070a18"/>
      <stop offset="100%" stop-color="#04050d"/>
    </radialGradient>
    <radialGradient id="core" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#9fe6ff"/>
      <stop offset="100%" stop-color="#3ff0c8"/>
    </radialGradient>
    <radialGradient id="o" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffd1c4"/>
      <stop offset="100%" stop-color="#ff5c5c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- bonds -->
  <g stroke="#bfefff" stroke-width="11" stroke-linecap="round" opacity="0.85" filter="url(#glow)">
    <line x1="256" y1="256" x2="158" y2="186"/>
    <line x1="256" y1="256" x2="354" y2="186"/>
  </g>
  <!-- atoms: central O, two H -->
  <circle cx="256" cy="256" r="62" fill="url(#o)" filter="url(#glow)"/>
  <circle cx="158" cy="186" r="38" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="354" cy="186" r="38" fill="url(#core)" filter="url(#glow)"/>
  <text x="256" y="256" font-family="Outfit,system-ui,sans-serif" font-size="56" font-weight="700" fill="#3a0f12" text-anchor="middle" dominant-baseline="central">O</text>
</svg>
